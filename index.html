<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Grass World — Three.js Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(14, 18, 16, 0.82);
        --panel-border: rgba(120, 200, 140, 0.22);
        --accent: #7fdca0;
        --text: #d7e6dc;
        --text-dim: #8fa899;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0f0d;
        font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        color: var(--text);
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Loading veil */
      #loader {
        position: fixed; inset: 0; z-index: 50;
        display: grid; place-content: center; gap: 0.6rem;
        background: radial-gradient(120% 120% at 50% 30%, #14201a 0%, #0b0f0d 70%);
        text-align: center;
        transition: opacity 0.6s ease;
      }
      #loader.hidden { opacity: 0; pointer-events: none; }
      #loader .title { font-size: 1.1rem; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; }
      #loader .sub { font-size: 0.8rem; color: var(--text-dim); }

      /* Controls hint */
      #hint {
        position: fixed; left: 16px; bottom: 14px; z-index: 20;
        max-width: 320px; padding: 10px 12px;
        background: var(--panel-bg); border: 1px solid var(--panel-border);
        border-radius: 10px; font-size: 11px; line-height: 1.55; color: var(--text-dim);
        backdrop-filter: blur(8px); pointer-events: none;
      }
      #hint b { color: var(--text); }
      #hint kbd {
        display: inline-block; min-width: 16px; padding: 1px 5px; margin: 0 1px;
        background: rgba(127, 220, 160, 0.12); border: 1px solid var(--panel-border);
        border-radius: 4px; color: var(--accent); font-size: 10px; text-align: center;
      }
      /* Slice-0A: in play mode the full editor controls bar must NOT leak in — the compact arrival
         ControlsHint is the single controls teacher. A CSS guarantee, independent of JS timing/paths. */
      body.play-mode #hint { display: none !important; }

      /* Crosshair (first-person) */
      #crosshair {
        position: fixed; left: 50%; top: 50%; z-index: 15;
        width: 6px; height: 6px; margin: -3px 0 0 -3px; border-radius: 50%;
        background: rgba(230, 245, 235, 0.65); box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
        display: none; pointer-events: none;
      }

      /* First-playable objective banner (top-center, runtime only) */
      #objective-banner {
        position: fixed; left: 50%; top: 18px; transform: translateX(-50%); z-index: 16;
        max-width: min(92vw, 640px); padding: 8px 16px; text-align: center;
        font: 12px/1.5 "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        letter-spacing: 0.03em; color: var(--text); background: var(--panel-bg);
        border: 1px solid var(--panel-border); border-radius: 10px; backdrop-filter: blur(8px);
        display: none; pointer-events: none;
      }

      .interaction-prompt {
        position: fixed; left: 50%; bottom: 54px; z-index: 18; transform: translate(-50%, 10px);
        display: flex; align-items: center; gap: 10px; padding: 9px 14px;
        color: var(--text); background: rgba(9, 17, 20, 0.88); border: 1px solid rgba(158, 238, 255, 0.42);
        border-radius: 9px; opacity: 0; transition: opacity 0.18s ease, transform 0.18s ease;
        pointer-events: none; font-size: 12px;
      }
      .interaction-prompt.visible { opacity: 1; transform: translate(-50%, 0); }
      .interaction-prompt kbd {
        min-width: 28px; padding: 4px 7px; text-align: center; color: #d8f8ff;
        background: rgba(103, 207, 232, 0.18); border: 1px solid rgba(158, 238, 255, 0.55); border-radius: 5px;
      }

      .completion-card {
        position: fixed; inset: 0; z-index: 45; display: grid; place-content: center; text-align: center;
        padding: 24px; background: radial-gradient(circle at 50% 42%, rgba(26, 68, 77, 0.82), rgba(5, 10, 13, 0.9));
        opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
      }
      .completion-card.visible { opacity: 1; pointer-events: auto; }
      .completion-card .eyebrow { color: #9eeeff; letter-spacing: 0.24em; font-size: 11px; }
      .completion-card h1 { margin: 12px 0 8px; font: 500 clamp(28px, 5vw, 54px)/1.1 Georgia, serif; color: #ecfbff; }
      .completion-card p { margin: 0 0 22px; color: #b7cbd0; }
      .completion-actions { display: flex; justify-content: center; gap: 12px; margin-bottom: 14px; }
      .completion-actions button {
        padding: 10px 18px; border-radius: 8px; cursor: pointer; font: inherit; transition: all 0.15s ease;
      }
      /* Play Again is the primary/obvious action; Keep Exploring is a quieter secondary. */
      .completion-actions button.primary {
        color: #06222b; background: #67e8ff; border: 1px solid #9eeeff; font-weight: 600;
      }
      .completion-actions button.primary:hover { background: #8af0ff; transform: translateY(-1px); }
      .completion-actions button.secondary {
        color: #b7cbd0; background: rgba(16, 36, 42, 0.6); border: 1px solid rgba(158, 238, 255, 0.28);
      }
      .completion-actions button.secondary:hover { color: #e8faff; border-color: rgba(158, 238, 255, 0.5); }
      .completion-hint { color: #7f99a0; font-size: 11px; line-height: 1.5; max-width: 380px; margin: 0 auto; }
      .completion-hint b { color: #aee6f2; font-weight: 600; }

      /* Slice-0A: arrival controls hint (teaches movement first; fades on first move) */
      .controls-hint {
        position: fixed; left: 50%; bottom: 96px; z-index: 17; transform: translate(-50%, 8px);
        display: flex; align-items: center; gap: 16px; padding: 8px 16px;
        color: var(--text); background: rgba(9, 17, 20, 0.82); border: 1px solid rgba(158, 238, 255, 0.3);
        border-radius: 9px; opacity: 0; transition: opacity 0.35s ease, transform 0.35s ease;
        pointer-events: none; font-size: 12px; backdrop-filter: blur(8px);
      }
      .controls-hint.visible { opacity: 1; transform: translate(-50%, 0); }
      .controls-hint b { color: #9eeeff; font-weight: 600; letter-spacing: 0.04em; }
      .controls-hint kbd {
        min-width: 20px; padding: 3px 6px; margin: 0 1px; text-align: center; color: #d8f8ff;
        background: rgba(103, 207, 232, 0.16); border: 1px solid rgba(158, 238, 255, 0.45); border-radius: 4px;
      }

      /* Slice-0A: toggleable friction trace / session log (press L in play mode) */
      .slice-trace {
        position: fixed; left: 14px; top: 14px; z-index: 19; width: min(300px, 42vw);
        max-height: 46vh; overflow: hidden; padding: 10px 12px;
        color: #bfeefc; background: rgba(6, 12, 15, 0.9); border: 1px solid rgba(158, 238, 255, 0.32);
        border-radius: 9px; opacity: 0; pointer-events: none; backdrop-filter: blur(6px);
        font: 11px/1.55 "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
      }
      .slice-trace.visible { opacity: 1; }
      .slice-trace-title { color: #9eeeff; letter-spacing: 0.16em; font-size: 9px; margin-bottom: 6px; }
      .slice-trace-row span { color: #6fb9cc; }
      .completion-actions button:hover { border-color: #9eeeff; color: #9eeeff; }

      /* Top-right action buttons */
      #toolbar { position: fixed; right: 16px; top: 14px; z-index: 25; display: flex; gap: 8px; }
      .btn {
        appearance: none; cursor: pointer; font: inherit; font-size: 11px; letter-spacing: 0.04em;
        padding: 7px 12px; color: var(--text); background: var(--panel-bg);
        border: 1px solid var(--panel-border); border-radius: 8px; backdrop-filter: blur(8px);
        transition: border-color 0.18s ease, color 0.18s ease, transform 0.06s ease;
      }
      .btn:hover { border-color: var(--accent); color: var(--accent); }
      .btn:active { transform: translateY(1px); }
      /* Slice-0A: Play is the primary entry — a fresh player should never need to type ?play=1. */
      .btn.btn-primary { color: #06222b; background: #67e8ff; border-color: #9eeeff; font-weight: 600; }
      .btn.btn-primary:hover { background: #8af0ff; color: #06222b; border-color: #c9f6ff; }

      /* Editor UX-1: Play → Editor return. The editor toolbar is hidden in play mode,
         so this standalone corner button is the way back to the authoring surface. */
      #exit-play { position: fixed; right: 16px; top: 14px; z-index: 26; display: none; }
      body.play-mode #exit-play { display: inline-flex; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="crosshair"></div>
    <div id="objective-banner"></div>

    <div id="toolbar">
      <button id="enter-play" class="btn btn-primary">▶ Play</button>
      <button id="open-editor" class="btn">▣ World Builder</button>
    </div>

    <!-- Editor UX-1: shown only in play mode (body.play-mode) — returns to the editor. -->
    <button id="exit-play" class="btn">⏹ Editor</button>

    <div id="hint">
      <b>Move</b> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &nbsp;
      <b>Jump</b> <kbd>Space</kbd> &nbsp; <b>Sprint</b> <kbd>Shift</kbd><br />
      <b>Look</b> click to capture mouse · <kbd>Esc</kbd> release<br />
      <b>Camera</b> <kbd>V</kbd> first/third person &nbsp; <b>Debug</b> <kbd>`</kbd>
    </div>

    <div id="loader">
      <div class="title">Grass World</div>
      <div class="sub">building terrain &amp; planting grass…</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
